version: 2
updates:
  # npm 依賴：每週檢查 + 安全更新（security updates 已於 repo 設定開啟，會額外針對漏洞開 PR）
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # 把開發/建置工具的小版本更新併成一個 PR，減少噪音
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions 版本更新（keep actions/checkout、setup-node 等最新）
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
