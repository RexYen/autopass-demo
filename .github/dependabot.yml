version: 2
updates:
  # npm 依賴：每週檢查 + 安全更新（security updates 已於 repo 設定開啟，會額外針對漏洞開 PR）
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # 把開發/建置工具的小版本更新併成一個 PR，減少噪音
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # 忽略 major 版本更新：破壞性升級多需 migration、常打破 build，
      # 改由人工評估後再手動升（minor/patch 與安全修補仍照常）。
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions 版本更新（keep actions/checkout、setup-node 等最新）
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
